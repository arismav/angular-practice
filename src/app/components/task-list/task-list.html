<section aria-label="Task list">
  @if (tasks().length === 0) {
    <p class="task-list__empty" role="status">No tasks yet — add one above!</p>
  } @else {
    <ul class="task-list" role="list">
      @for (task of tasks(); track task.id) {
        <li role="listitem">
          <app-task-item
            [task]="task"
            (statusChange)="onStatusChange(task.id, $event)"
            (remove)="onRemove(task.id)"
          />
        </li>
      }
    </ul>
  }
</section>
