<nav aria-label="Filter tasks by status">
  <ul class="flex flex-wrap gap-2" role="list">
    @for (f of filters; track f.value) {
      <li>
        <button
          type="button"
          (click)="setFilter(f.value)"
          [attr.aria-pressed]="activeFilter() === f.value"
          [class]="
            activeFilter() === f.value
              ? 'px-4 py-2 rounded-full text-sm font-semibold bg-slate-800 text-white shadow'
              : 'px-4 py-2 rounded-full text-sm font-semibold bg-white text-gray-600 border border-gray-200 hover:border-slate-400 hover:text-slate-800 transition-colors'
          "
        >
          {{ f.label }}
        </button>
      </li>
    }
  </ul>
</nav>
