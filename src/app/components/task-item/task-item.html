<article
  class="task-item"
  [class]="cardClasses()"
  [attr.aria-label]="'Task: ' + task().title"
>

  <div class="task-item__body">
    <span class="task-item__title" [class]="titleClasses()">
      {{ task().title }}
    </span>
    <span class="task-item__badge" [class]="badgeClasses()">
      {{ statusLabel() }}
    </span>
  </div>

  <div
    class="task-item__actions"
    role="group"
    [attr.aria-label]="'Actions for ' + task().title"
  >
    @if (task().status !== 'in-progress') {
      <button class="task-btn task-btn--start" (click)="onStatusChange('in-progress')" aria-label="Mark as in progress">
        &#9654; Start
      </button>
    }
    @if (task().status !== 'done') {
      <button class="task-btn task-btn--done" (click)="onStatusChange('done')" aria-label="Mark as done">
        &#10003; Done
      </button>
    }
    @if (task().status !== 'todo') {
      <button class="task-btn task-btn--reset" (click)="onStatusChange('todo')" aria-label="Reset to todo">
        &#8635; Reset
      </button>
    }
    <button
      class="task-btn task-btn--remove"
      (click)="onRemove()"
      [attr.aria-label]="'Remove task: ' + task().title"
    >
      &#10005;
    </button>
  </div>

</article>
