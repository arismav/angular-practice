name: NPM Audit

on:
  schedule:
    - cron: '12 5 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-audit:
    name: Audit production dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm run audit:prod
